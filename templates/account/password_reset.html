{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Reset Password</h2>
            <p class="text-center text-muted">Enter your email address and we'll send you a link to reset your password.</p>
            <form method="POST" action="{% url 'account_reset_password' %}">
                {% csrf_token %}
                {{ form | crispy }}
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg">Reset Password</button>
                </div>
            </form>
            <p class="text-center mt-3">
                <a href="{% url 'account_login' %}">Back to Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
