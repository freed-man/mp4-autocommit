{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Set New Password</h2>
            {% if token_fail %}
            <p class="text-danger text-center">This password reset link is invalid or has expired.</p>
            <div class="text-center">
                <a href="{% url 'account_reset_password' %}" class="btn btn-outline-dark">Request a new link</a>
            </div>
            {% else %}
            <form method="POST">
                {% csrf_token %}
                {{ form | crispy }}
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg">Set New Password</button>
                </div>
            </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
