{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h2 class="mb-4">Confirm Email</h2>
            {% if confirmation %}
            <p>Please confirm that <strong>{{ confirmation.email_address.email }}</strong> is your email address.</p>
            <form method="POST" action="{% url 'account_confirm_email' confirmation.key %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-dark btn-lg">Confirm</button>
            </form>
            {% else %}
            <p class="text-danger">This confirmation link is invalid or has expired.</p>
            <a href="{% url 'home' %}" class="btn btn-outline-dark">Back to Home</a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
