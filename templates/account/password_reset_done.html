{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h2 class="mb-4">Password Reset Sent</h2>
            <p>We have sent you an email with a link to reset your password. Please check your inbox.</p>
            <p class="text-muted">If you don't see the email, check your spam folder.</p>
            <a href="{% url 'account_login' %}" class="btn btn-outline-dark">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
